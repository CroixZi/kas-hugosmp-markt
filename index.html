<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAS Hugosmp Markt</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4fbff;
    color:#222;
}

header{
    background:#9fdcff;
    padding:30px;
    text-align:center;
}

header h1{
    margin:0;
    color:white;
    font-size:3rem;
}

.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h2{
    color:#4baee8;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    color:#4baee8;
}

.btn{
    background:#4baee8;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:10px;
    display:inline-block;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#9fdcff;
    color:white;
}
</style>
</head>

<body>

<header>
<h1>KAS Hugosmp Markt</h1>
</header>

<section class="hero">
<h2>Die besten XYZoom Texture Packs</h2>
<p>Wähle dein Lieblings-Pack aus.</p>
</section>

<div class="container">

<div class="card">
<h3>35k Pack</h3>
<p>Premium Texture Pack</p>
<a href="#" class="btn">Ansehen</a>
</div>

<div class="card">
<h3>Private 30k Pack</h3>
<p>Exklusives Pack</p>
<a href="#" class="btn">Ansehen</a>
</div>

<div class="card">
<h3>25k Pack</h3>
<p>Beliebtes Texture Pack</p>
<a href="#" class="btn">Ansehen</a>
</div>

<div class="card">
<h3>20k Pack</h3>
<p>Günstiges Texture Pack</p>
<a href="#" class="btn">Ansehen</a>
</div>

</div>

<footer>
© 2026 KAS Hugosmp Markt
</footer>

</body>
</html>
